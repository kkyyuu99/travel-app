<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="도쿄 여행">
<meta name="theme-color" content="#0d1117">
<meta name="description" content="도쿄 여행 일정·날씨·환율 오프라인 가이드">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<title>🗼 도쿄 여행 바이블</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #111820;
    --surface2: rgba(255,255,255,0.03);
    --border: rgba(255,255,255,0.07);
    --text: rgba(255,255,255,0.9);
    --muted: rgba(255,255,255,0.45);
    --dim: rgba(255,255,255,0.25);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: -apple-system, 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

  /* Top bar */
  #topbar {
    padding: calc(var(--safe-top) + 8px) 12px 8px;
    background: rgba(13,17,23,0.96);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 50;
  }
  #topbar h1 {
    font-size: 13px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #day-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }
  #day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .day-tab.active {
    color: var(--day-color);
    background: color-mix(in srgb, var(--day-color) 15%, transparent);
    border-color: color-mix(in srgb, var(--day-color) 40%, transparent);
  }
  .day-tab .progress-badge {
    font-size: 9px;
    margin-left: 4px;
    opacity: 0.7;
  }

  /* Weather strip */
  #weather-strip {
    display: flex;
    gap: 6px;
    padding: 6px 12px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: rgba(13,17,23,0.6);
  }
  #weather-strip::-webkit-scrollbar { display: none; }
  .wx-card {
    flex-shrink: 0;
    min-width: 68px;
    padding: 6px 8px;
    border-radius: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    font-size: 10px;
  }
  .wx-date { color: var(--dim); font-weight: 600; font-size: 9px; }
  .wx-icon { font-size: 18px; line-height: 1; }
  .wx-label { color: var(--dim); font-size: 9px; }
  .wx-temps { display: flex; gap: 5px; font-weight: 700; font-size: 11px; }
  .wx-high { color: #fb923c; }
  .wx-low  { color: #60a5fa; }
  .wx-rain { color: #60a5fa; font-size: 9px; }

  /* Progress bar */
  #progress-bar { height: 2px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
  #progress-fill { height: 100%; background: var(--day-color); transition: width 0.4s; width: 0%; }

  /* Scroll area */
  #scroll-area {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 12px 14px calc(var(--safe-bottom) + 80px);
  }

  /* Day header */
  .day-header {
    padding: 14px 0 10px;
    margin-bottom: 2px;
  }
  .day-header .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 99px;
    font-size: 10px;
    font-weight: 700;
    margin-bottom: 6px;
    background: color-mix(in srgb, var(--day-color) 18%, transparent);
    color: var(--day-color);
    border: 1px solid color-mix(in srgb, var(--day-color) 35%, transparent);
  }
  .day-header h2 {
    font-size: 17px;
    font-weight: 700;
    font-family: 'Noto Serif KR', Georgia, serif;
    line-height: 1.3;
  }
  .day-header p {
    font-size: 11px;
    color: var(--muted);
    margin-top: 3px;
  }

  /* Timeline item */
  .tl-row { display: flex; gap: 10px; margin-bottom: 2px; }
  .tl-spine { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 28px; }
  .tl-dot {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    flex-shrink: 0;
    border: 2px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
  }
  .tl-dot.highlight {
    background: color-mix(in srgb, var(--day-color) 18%, transparent);
    border-color: var(--day-color);
  }
  .tl-dot.checked {
    background: var(--day-color);
    border-color: var(--day-color);
  }
  .tl-line { width: 1px; flex: 1; background: rgba(255,255,255,0.05); min-height: 12px; margin-top: 2px; }

  .tl-card {
    flex: 1;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    margin-bottom: 8px;
    transition: all 0.2s;
    overflow: hidden;
  }
  .tl-card.highlight {
    background: color-mix(in srgb, var(--day-color) 6%, transparent);
    border-color: color-mix(in srgb, var(--day-color) 35%, transparent);
  }
  .tl-card.checked { opacity: 0.45; }

  .tl-head { padding: 10px 12px; cursor: pointer; }
  .tl-meta { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 5px; }
  .tl-time {
    font-size: 10px;
    font-weight: 700;
    font-family: monospace;
    padding: 2px 6px;
    border-radius: 5px;
    background: color-mix(in srgb, var(--day-color) 18%, transparent);
    color: var(--day-color);
  }
  .tl-badge {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 99px;
  }
  .tl-memo-badge {
    font-size: 9px;
    color: #fbbf24;
    background: rgba(251,191,36,0.12);
    border: 1px solid rgba(251,191,36,0.25);
    padding: 1px 6px;
    border-radius: 99px;
  }
  .tl-title-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
  .tl-title { font-size: 13px; font-weight: 600; line-height: 1.35; flex: 1; }
  .tl-title.checked { text-decoration: line-through; }
  .tl-sub { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .tl-desc { font-size: 11px; color: var(--muted); margin-top: 5px; line-height: 1.55; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

  .check-btn {
    width: 22px; height: 22px;
    border-radius: 6px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0;
    transition: all 0.2s;
  }
  .check-btn.checked { background: var(--day-color); border-color: var(--day-color); }
  .check-btn svg { display: none; }
  .check-btn.checked svg { display: block; }

  /* Expanded body */
  .tl-body { border-top: 1px solid var(--border); padding: 10px 12px 12px; display: none; }
  .tl-body.open { display: block; }

  .tl-cost { display: flex; align-items: flex-start; gap: 6px; font-size: 11px; color: var(--muted); margin-bottom: 6px; }
  .tl-cost span:first-child { color: #f5c842; margin-top: 1px; }
  .tl-tip { display: flex; align-items: flex-start; gap: 6px; font-size: 11px; color: rgba(255,255,255,0.6); background: rgba(255,255,255,0.03); border-radius: 8px; padding: 8px 10px; margin-bottom: 8px; line-height: 1.5; }
  .tl-tip span:first-child { color: #f5c842; flex-shrink: 0; margin-top: 1px; }

  .map-link {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    border-radius: 8px;
    text-decoration: none;
    color: var(--day-color);
    background: color-mix(in srgb, var(--day-color) 15%, transparent);
    border: 1px solid color-mix(in srgb, var(--day-color) 30%, transparent);
    margin-bottom: 10px;
  }

  /* Memo */
  .memo-area { margin-top: 6px; }
  .memo-btn {
    width: 100%;
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px dashed rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.02);
    cursor: pointer;
    text-align: left;
    font-size: 11px;
    color: rgba(255,255,255,0.28);
    transition: all 0.2s;
    font-family: inherit;
  }
  .memo-btn.has-memo {
    border: 1px solid rgba(251,191,36,0.2);
    background: rgba(251,191,36,0.05);
    color: rgba(255,255,255,0.65);
  }
  .memo-editor { display: none; }
  .memo-editor.open { display: block; }
  .memo-textarea {
    width: 100%;
    min-height: 70px;
    padding: 8px 10px;
    border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid color-mix(in srgb, var(--day-color) 40%, transparent);
    color: var(--text);
    font-size: 12px;
    line-height: 1.6;
    resize: none;
    outline: none;
    font-family: inherit;
    margin-bottom: 6px;
  }
  .memo-actions { display: flex; gap: 6px; }
  .btn-save {
    padding: 5px 14px;
    border-radius: 8px;
    background: color-mix(in srgb, var(--day-color) 25%, transparent);
    border: 1px solid color-mix(in srgb, var(--day-color) 45%, transparent);
    color: var(--day-color);
    font-size: 11px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-cancel {
    padding: 5px 12px;
    border-radius: 8px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }
  .btn-del {
    margin-left: auto;
    padding: 5px 12px;
    border-radius: 8px;
    background: rgba(255,100,100,0.08);
    border: 1px solid rgba(255,100,100,0.2);
    color: #f87171;
    font-size: 11px;
    cursor: pointer;
    font-family: inherit;
  }

  /* Route connector */
  .route-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    margin: -4px 0 8px 34px;
    padding: 5px 10px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 10px;
    font-weight: 600;
    border: 1px solid;
  }
  .route-btn .route-dur { margin-left: auto; font-size: 10px; color: var(--dim); font-weight: 400; }

  /* Bottom nav */
  #bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: calc(56px + var(--safe-bottom));
    background: rgba(13,17,23,0.96);
    backdrop-filter: blur(16px);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    padding-top: 8px;
    z-index: 50;
  }
  .nav-btn {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    cursor: pointer;
    color: var(--dim);
    font-size: 9px;
    font-weight: 600;
    padding: 4px 0;
    transition: color 0.2s;
    background: none;
    border: none;
    font-family: inherit;
  }
  .nav-btn.active { color: var(--day-color); }
  .nav-btn svg { transition: transform 0.2s; }
  .nav-btn.active svg { transform: scale(1.1); }

  /* Sheet (modal) */
  .sheet-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 60;
    align-items: flex-end;
  }
  .sheet-overlay.open { display: flex; }
  .sheet {
    width: 100%;
    max-height: 88dvh;
    background: var(--surface);
    border-radius: 20px 20px 0 0;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding-bottom: var(--safe-bottom);
  }
  .sheet-handle { width: 36px; height: 4px; border-radius: 2px; background: rgba(255,255,255,0.18); margin: 12px auto 4px; flex-shrink: 0; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 0 20px 12px; flex-shrink: 0; }
  .sheet-title { font-size: 16px; font-weight: 700; }
  .sheet-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 22px; line-height: 1; padding: 4px; }
  .sheet-tabs { display: flex; gap: 5px; padding: 0 16px 12px; flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
  .sheet-tabs::-webkit-scrollbar { display: none; }
  .sheet-tab {
    flex-shrink: 0;
    padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer;
    background: var(--surface2); color: var(--muted);
    border: 1px solid var(--border);
    font-family: inherit;
    transition: all 0.2s;
  }
  .sheet-tab.active {
    background: color-mix(in srgb, var(--day-color) 18%, transparent);
    color: var(--day-color);
    border-color: color-mix(in srgb, var(--day-color) 40%, transparent);
  }
  .sheet-body { flex: 1; overflow-y: auto; padding: 0 16px 20px; }

  /* Budget */
  .budget-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; border-radius: 8px; background: var(--surface2); margin-bottom: 6px; }
  .budget-row span:first-child { font-size: 12px; color: rgba(255,255,255,0.7); }
  .budget-amounts { display: flex; gap: 10px; font-size: 12px; font-weight: 600; }
  .budget-jpy { color: var(--muted); }
  .budget-krw { color: var(--text); }
  .budget-total { display: flex; justify-content: space-between; padding: 12px; border-radius: 8px; margin-top: 4px; }

  /* Tracker */
  .tracker-total { padding: 12px; border-radius: 10px; margin-bottom: 14px; }
  .tracker-total-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .tracker-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .tracker-fill { height: 100%; border-radius: 3px; transition: width 0.4s; }
  .tracker-labels { display: flex; justify-content: space-between; margin-top: 4px; font-size: 10px; color: var(--dim); }
  .day-tracker { margin-bottom: 14px; padding: 12px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); }
  .day-tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .day-tracker-title { font-size: 11px; color: var(--muted); }
  .day-tracker-amount { font-size: 12px; font-weight: 700; }
  .expense-chips { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .expense-chip { display: flex; align-items: center; gap: 3px; padding: 3px 8px; border-radius: 99px; background: rgba(255,255,255,0.07); font-size: 11px; color: rgba(255,255,255,0.7); }
  .expense-del { background: none; border: none; color: rgba(255,255,255,0.3); cursor: pointer; font-size: 14px; padding: 0; line-height: 1; }
  .expense-input-row { display: flex; gap: 6px; }
  .expense-input {
    flex: 1; padding: 7px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--text); font-size: 12px; outline: none;
    font-family: inherit;
  }
  .expense-add { padding: 7px 12px; border-radius: 8px; font-size: 16px; cursor: pointer; font-family: inherit; }

  /* Currency */
  .rate-card { padding: 14px; border-radius: 10px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .rate-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .rate-value { font-size: 22px; font-weight: 700; font-family: monospace; }
  .rate-updated { font-size: 10px; color: var(--dim); margin-top: 2px; }
  .rate-refresh { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 50%; }
  .currency-inputs { display: grid; gap: 8px; margin-bottom: 12px; }
  .currency-label { font-size: 10px; color: var(--muted); margin-bottom: 4px; }
  .currency-input {
    width: 100%; padding: 12px; border-radius: 10px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--text); font-size: 18px; font-weight: 700;
    font-family: monospace; outline: none;
  }
  .currency-sep { text-align: center; color: var(--dim); font-size: 20px; }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .quick-btn { padding: 6px 10px; border-radius: 99px; background: var(--surface2); border: 1px solid var(--border); cursor: pointer; font-size: 10px; color: var(--muted); font-family: inherit; }
  .quick-jpy { color: var(--muted); }
  .quick-krw { color: var(--day-color); margin-left: 3px; }
  .preset-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 10px; border-radius: 8px; background: var(--surface2); margin-bottom: 4px; cursor: pointer; }
  .preset-label { font-size: 12px; color: rgba(255,255,255,0.6); }
  .preset-amounts { display: flex; gap: 8px; font-size: 11px; font-weight: 600; }

  /* Checklist mode */
  .check-section-title { font-size: 10px; font-weight: 700; letter-spacing: 2px; color: var(--dim); text-transform: uppercase; margin: 14px 0 8px; }
  .all-check-card { display: flex; align-items: flex-start; gap: 10px; padding: 10px 12px; border-radius: 10px; background: var(--surface2); border: 1px solid var(--border); margin-bottom: 6px; cursor: pointer; }
  .all-check-dot { width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid rgba(255,255,255,0.1); }
  .all-check-dot.done { border-color: var(--day-color); background: var(--day-color); }
  .all-check-title { font-size: 12px; font-weight: 600; }
  .all-check-title.done { text-decoration: line-through; color: var(--muted); }
  .all-check-time { font-size: 10px; color: var(--muted); margin-top: 2px; }

  /* Toast */
  #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: rgba(30,35,45,0.95); border: 1px solid var(--border); color: var(--text); padding: 10px 20px; border-radius: 99px; font-size: 13px; font-weight: 600; opacity: 0; transition: all 0.3s; z-index: 100; pointer-events: none; white-space: nowrap; backdrop-filter: blur(12px); }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.3s ease both; }

  /* spin for refresh */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinning { animation: spin 1s linear infinite; }
</style>
</head>
<body>

<div id="topbar">
  <h1>🗼 도쿄 여행 바이블</h1>
  <div id="day-tabs"></div>
</div>

<div id="weather-strip">
  <div style="display:flex;align-items:center;gap:6px;color:rgba(255,255,255,0.3);font-size:11px;flex-shrink:0">
    <span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> 날씨 로딩 중
  </div>
</div>

<div id="progress-bar"><div id="progress-fill"></div></div>

<div id="scroll-area"></div>

<nav id="bottom-nav">
  <button class="nav-btn active" id="nav-timeline" onclick="switchView('timeline')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    일정
  </button>
  <button class="nav-btn" id="nav-check" onclick="switchView('check')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    체크
  </button>
  <button class="nav-btn" id="nav-budget" onclick="openSheet('budget')">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>

function loadState() {
  try { checkedItems = JSON.parse(localStorage.getItem('tk_checked') || '{}'); } catch {}

/* ── CSS VAR helpers ── */
function setDayColor(c) {
  document.documentElement.style.setProperty('--day-color', c);
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

/* ── WEATHER ── */
async function loadWeather() {
  try {
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=35.6762&longitude=139.6503&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode&timezone=Asia%2FTokyo&start_date=2026-05-25&end_date=2026-05-28');
    const j = await r.json();
    const labels = ['5/25 월','5/26 화','5/27 수','5/28 목'];
    const wxIcon = c => c===0?'☀️':c<=2?'🌤️':c<=3?'☁️':c<=48?'🌫️':c<=57?'🌦️':c<=67?'🌧️':c<=77?'❄️':c<=82?'🌦️':c<=99?'⛈️':'🌡️';
    const wxLbl = c => c===0?'맑음':c<=2?'구름조금':c<=3?'흐림':c<=48?'안개':c<=57?'이슬비':c<=67?'비':c<=77?'눈':c<=82?'소나기':c<=99?'천둥':'?';
    weatherData = j.daily.time.map((t,i)=>({
      dateKo: labels[i],
      max: Math.round(j.daily.temperature_2m_max[i]),
      min: Math.round(j.daily.temperature_2m_min[i]),
      precip: j.daily.precipitation_probability_max[i],
      code: j.daily.weathercode[i],
      icon: wxIcon(j.daily.weathercode[i]),
      label: wxLbl(j.daily.weathercode[i])
    }));
    renderWeather();
  } catch(e) {
    document.getElementById('weather-strip').innerHTML = '<div style="font-size:11px;color:rgba(255,255,255,0.3);padding:6px 4px">날씨 정보를 불러올 수 없습니다</div>';
  }
}

function renderWeather() {
  if (!weatherData) return;
  const strip = document.getElementById('weather-strip');
  strip.innerHTML = weatherData.map(d => `
    <div class="wx-card">
      <div class="wx-date">${d.dateKo}</div>
      <div class="wx-icon">${d.icon}</div>
      <div class="wx-label">${d.label}</div>
      <div class="wx-temps"><span class="wx-high">${d.max}°</span><span class="wx-low">${d.min}°</span></div>
      ${d.precip > 20 ? `<div class="wx-rain">💧${d.precip}%</div>` : ''}
    </div>
  `).join('');
}

/* ── EXCHANGE RATE ── */
async function loadRate() {
  try {
    const r = await fetch('https://api.frankfurter.app/latest?from=JPY&to=KRW');
    const j = await r.json();
    exchangeRate = j.rates.KRW;
    return exchangeRate;
  } catch {
    exchangeRate = 9.1; // fallback
    return 9.1;
  }
}

/* ── RENDER TABS ── */
function renderTabs() {
  const cont = document.getElementById('day-tabs');
  cont.innerHTML = DAYS.map(d => {
    const checked = d.items.filter(it => checkedItems[it.id]).length;
    const isActive = d.day === activeDay;
    return `<button class="day-tab ${isActive?'active':''}" onclick="switchDay(${d.day})"
      style="--day-color:${d.color}">
      ● D${d.day}${checked>0?`<span class="progress-badge">${checked}/${d.items.length}</span>`:''}
    </button>`;
  }).join('');
}

/* ── RENDER PROGRESS ── */
function renderProgress() {
  const day = DAYS.find(d => d.day === activeDay);
  const checked = day.items.filter(it => checkedItems[it.id]).length;
  const pct = day.items.length > 0 ? (checked / day.items.length) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
}

        <div class="tl-card ${item.highlight?'highlight':''} ${checked?'checked':''}" id="card-${item.id}">

              ${memo ? `<span class="tl-memo-badge">📝</span>` : ''}
            </div>
            <div class="tl-title-row">
              <div>
                <div class="tl-title ${checked?'checked':''}">${item.title}</div>
                ${item.sub ? `<div class="tl-sub">${item.sub}</div>` : ''}
                <div class="tl-desc">${item.desc.split('\n')[0]}</div>
              </div>
              <div class="check-btn ${checked?'checked':''}" onclick="event.stopPropagation();toggleCheck('${item.id}')">
                <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
              </div>
            </div>
          </div>
          <div class="tl-body" id="body-${item.id}">
            ${item.desc.includes('\n') ? item.desc.split('\n').slice(1).map(l=>`<p style="font-size:11px;color:rgba(255,255,255,0.55);margin-bottom:5px;padding-left:8px;border-left:2px solid color-mix(in srgb,${day.color} 30%,transparent);line-height:1.5">${l}</p>`).join('') : ''}
            ${item.cost ? `<div class="tl-cost"><span>💴</span><span>${item.cost}</span></div>` : ''}
            ${item.tip ? `<div class="tl-tip"><span>💡</span><span>${item.tip}</span></div>` : ''}
            ${item.map ? `<a class="map-link" href="https://maps.google.com/maps?q=${encodeURIComponent(item.map)}" target="_blank">📍 구글 지도에서 보기</a>` : ''}
            <div class="memo-area">
              <button class="memo-btn ${memo?'has-memo':''}" id="memobtn-${item.id}" onclick="openMemo('${item.id}')">
                ✏️ ${memo || '메모 추가...'}
              </button>
              <div class="memo-editor" id="memoeditor-${item.id}">
                <textarea class="memo-textarea" id="memotext-${item.id}" placeholder="나만의 메모를 입력하세요...">${memo}</textarea>

/* ── CARD TOGGLE ── */
function toggleCard(id) {
  const body = document.getElementById('body-' + id);
  body.classList.toggle('open');
}

/* ── CHECK TOGGLE ── */
function toggleCheck(id) {
  checkedItems[id] = !checkedItems[id];
  saveChecked();
  const card = document.getElementById('card-' + id);
  const dot = document.getElementById('dot-' + id);
  const btn = document.querySelector(`[onclick*="toggleCheck('${id}')"]`);
  if (card) card.classList.toggle('checked', !!checkedItems[id]);
  if (dot) {
    dot.classList.toggle('checked', !!checkedItems[id]);
    const day = DAYS.find(d => d.items.some(it => it.id === id));
    const item = day?.items.find(it => it.id === id);
    dot.innerHTML = checkedItems[id]
      ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>'
      : (item?.icon || '·');
  }
  if (btn) btn.classList.toggle('checked', !!checkedItems[id]);
  renderTabs();
  renderProgress();
  if (checkedItems[id]) showToast('✅ 완료!');
}

/* ── MEMO ── */
function openMemo(id) {
  document.getElementById('memobtn-' + id).style.display = 'none';
  document.getElementById('memoeditor-' + id).classList.add('open');
  document.getElementById('memotext-' + id).focus();
}
function closeMemo(id) {
  document.getElementById('memoeditor-' + id).classList.remove('open');
  document.getElementById('memobtn-' + id).style.display = 'flex';
  // Restore textarea to saved value
  document.getElementById('memotext-' + id).value = memos[id] || '';
}
function saveMemo(id) {
  const val = document.getElementById('memotext-' + id).value.trim();
  memos[id] = val;
  saveMemos();
  const btn = document.getElementById('memobtn-' + id);
  btn.className = 'memo-btn ' + (val ? 'has-memo' : '');
  btn.innerHTML = '✏️ ' + (val || '메모 추가...');
  btn.style.display = 'flex';
  document.getElementById('memoeditor-' + id).classList.remove('open');
  // Update memo badge
  if (val) showToast('📝 메모 저장됨');
  // Refresh timeline to show badge
  renderTimeline();
}
function deleteMemo(id) {
  memos[id] = '';
  saveMemos();
  const btn = document.getElementById('memobtn-' + id);
  btn.className = 'memo-btn';
  btn.innerHTML = '✏️ 메모 추가...';
  btn.style.display = 'flex';
  document.getElementById('memoeditor-' + id).classList.remove('open');
  renderTimeline();
}

/* ── VIEW SWITCH ── */
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + view).classList.add('active');
  if (view === 'timeline') renderTimeline();
  else if (view === 'check') renderChecklist();
}

function switchDay(day) {
  activeDay = day;
  const color = DAY_COLORS[day];
  setDayColor(color);
  renderTabs();
  renderProgress();
  if (currentView === 'timeline') renderTimeline();
  else renderChecklist();
}

/* ── SHEET ── */
function openSheet(type) {
  currentSheet = type;
  const overlay = document.getElementById('main-sheet');
  overlay.classList.add('open');
  if (type === 'budget') renderBudgetSheet();
  else if (type === 'currency') renderCurrencySheet();
}
function closeSheet() {
  document.getElementById('main-sheet').classList.remove('open');
  currentSheet = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + currentView).classList.add('active');
}

/* ── BUDGET SHEET ── */
let budgetTab = 'budget';
function renderBudgetSheet() {
  document.getElementById('sheet-title').textContent = '예산 & 가계부';
  const color = DAY_COLORS[activeDay];
  document.getElementById('sheet-tabs').innerHTML = [
    {k:'budget', label:'💴 예산'},
    {k:'tracker', label:'📊 가계부'},
    {k:'card', label:'💳 현대카드'},
  ].map(t=>`<button class="sheet-tab ${budgetTab===t.k?'active':''}" onclick="switchBudgetTab('${t.k}')" style="--day-color:${color}">${t.label}</button>`).join('');
  renderBudgetTabContent();
}
function switchBudgetTab(tab) {
  budgetTab = tab;
  renderBudgetSheet();
}
function renderBudgetTabContent() {
  const color = DAY_COLORS[activeDay];
  const body = document.getElementById('sheet-body');

  if (budgetTab === 'budget') {
    const total = BUDGET.reduce((a,b)=>a+b.jpy,0);
    body.innerHTML = `
      ${BUDGET.map(r=>`
        <div class="budget-row">
          <span>${r.label}</span>
          <div class="budget-amounts">
            <span class="budget-jpy">¥${r.jpy.toLocaleString()}</span>
            <span class="budget-krw">≈₩${Math.round(r.jpy * 9.1 / 100) * 100}원</span>
          </div>
        </div>
      `).join('')}
      <div class="budget-total" style="background:color-mix(in srgb,${color} 18%,transparent);border:1px solid color-mix(in srgb,${color} 30%,transparent);border-radius:8px;margin-top:8px">
        <span style="font-size:13px;font-weight:700;color:${color}">총 합계</span>
        <div class="budget-amounts">
          <span style="color:rgba(255,255,255,0.6)">¥${total.toLocaleString()}</span>
          <span style="color:${color};font-weight:700">≈₩${(Math.round(total * 9.1 / 1000) * 1000).toLocaleString()}원</span>
        </div>
      </div>
    `;
  } else if (budgetTab === 'tracker') {
    const grandTotal = [1,2,3,4].reduce((a,d)=>a+(expenses[d]||[]).reduce((s,v)=>s+v,0),0);
    const grandBudget = 52040;
    const pct = Math.min(100, (grandTotal/grandBudget)*100);
    let html = `
      <div class="tracker-total" style="background:color-mix(in srgb,${color} 12%,transparent);border:1px solid color-mix(in srgb,${color} 25%,transparent)">
        <div class="tracker-total-row">
          <span style="font-size:12px;color:rgba(255,255,255,0.5)">총 지출</span>
          <span style="font-size:16px;font-weight:700;color:${color}">¥${grandTotal.toLocaleString()}</span>
        </div>
        <div class="tracker-bar"><div class="tracker-fill" style="width:${pct}%;background:${color}"></div></div>
        <div class="tracker-labels"><span>0</span><span>예산 ¥${grandBudget.toLocaleString()}</span></div>
      </div>
    `;
    [1,2,3,4].forEach(day => {
      const dc = DAY_COLORS[day];
      const dayData = DAYS.find(d=>d.day===day);
      const spent = (expenses[day]||[]).reduce((a,b)=>a+b,0);
      const budget = DAY_BUDGET[day];
      const over = spent > budget;
      const dpct = Math.min(100, (spent/budget)*100);
      html += `
        <div class="day-tracker">
          <div class="day-tracker-header">
            <div>
              <span style="font-size:11px;font-weight:700;color:${dc}">DAY ${day}</span>
              <span class="day-tracker-title"> · ${dayData.theme}</span>
            </div>
            <span class="day-tracker-amount" style="color:${over?'#f87171':dc}">${spent.toLocaleString()} / ${budget.toLocaleString()}엔</span>
          </div>
          <div class="tracker-bar" style="margin-bottom:10px"><div class="tracker-fill" style="width:${dpct}%;background:${over?'#f87171':dc}"></div></div>
          <div class="expense-chips" id="chips-day${day}">
            ${(expenses[day]||[]).map((amt,i)=>`
              <div class="expense-chip">¥${amt.toLocaleString()}<button class="expense-del" onclick="removeExpense(${day},${i})">×</button></div>
            `).join('')}
          </div>
          <div class="expense-input-row">
            <input class="expense-input" type="number" placeholder="금액 입력 (엔)" id="einput-${day}" onkeydown="if(event.key==='Enter')addExpense(${day})">
            <button class="expense-add" style="background:color-mix(in srgb,${dc} 25%,transparent);border:1px solid color-mix(in srgb,${dc} 40%,transparent);color:${dc};border-radius:8px;font-size:16px;cursor:pointer" onclick="addExpense(${day})">＋</button>
          </div>
        </div>
      `;
    });
    body.innerHTML = html;
  } else if (budgetTab === 'card') {
    body.innerHTML = [
      {title:"츠타야 쉐어라운지 동반 1인 1시간 무료", desc:"시부야 스크램블 스퀘어 11층 · 2026.6.12까지", badge:"이번 여행 적용", color:"#ff6b9d"},
      {title:"롯폰기힐즈 전망대 500엔 할인", desc:"월 1,000명 선착순", badge:"선착순", color:"#f5c842"},
      {title:"국립신미술관 기획전 관람권", desc:"연 1회 · 본인 회원 한정", badge:"연 1회", color:"#4fc3f7"},
    ].map(it=>`
      <div style="padding:14px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid color-mix(in srgb,${it.color} 20%,transparent);margin-bottom:8px">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px">
          <p style="font-size:13px;font-weight:600;flex:1">${it.title}</p>
          <span style="font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:color-mix(in srgb,${it.color} 18%,transparent);color:${it.color};border:1px solid color-mix(in srgb,${it.color} 30%,transparent);flex-shrink:0;margin-left:8px">${it.badge}</span>
        </div>
        <p style="font-size:11px;color:rgba(255,255,255,0.45)">${it.desc}</p>
      </div>
    `).join('');
  }
}

function addExpense(day) {
  const input = document.getElementById(`einput-${day}`);
  const n = parseInt(input.value);
  if (isNaN(n) || n <= 0) return;
  if (!expenses[day]) expenses[day] = [];
  expenses[day].push(n);
  saveExpenses();
  input.value = '';
  renderBudgetTabContent();
  showToast(`💴 ¥${n.toLocaleString()} 추가됨`);
}

function removeExpense(day, idx) {
  expenses[day].splice(idx, 1);
  saveExpenses();
  renderBudgetTabContent();
}

/* ── CURRENCY SHEET ── */
async function renderCurrencySheet() {
  document.getElementById('sheet-title').textContent = '환율 계산기';
  const color = DAY_COLORS[activeDay];
  document.getElementById('sheet-tabs').innerHTML = '';
  document.getElementById('sheet-body').innerHTML = `
    <div class="rate-card" style="background:color-mix(in srgb,${color} 12%,transparent);border:1px solid color-mix(in srgb,${color} 25%,transparent)">
      <div>
        <div class="rate-label">현재 환율 (JPY → KRW)</div>
        <div class="rate-value" id="rate-val" style="color:${color}">로딩 중...</div>
        <div class="rate-updated" id="rate-upd"></div>
      </div>
      <button class="rate-refresh" onclick="refreshRate()" style="color:${color}">
        <svg id="rate-spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      </button>
    </div>
    <div class="currency-inputs">
      <div>
        <div class="currency-label">일본 엔 (¥)</div>
        <input class="currency-input" id="inp-jpy" type="number" placeholder="0" oninput="calcKrw()" style="border-color:color-mix(in srgb,${color} 35%,transparent)">
      </div>
      <div class="currency-sep">⇅</div>
      <div>
        <div class="currency-label">한국 원 (₩)</div>
        <input class="currency-input" id="inp-krw" type="text" placeholder="0" oninput="calcJpy()" style="border-color:color-mix(in srgb,${color} 35%,transparent)">
      </div>
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,0.3);margin-bottom:8px">빠른 변환 (엔)</div>
    <div class="quick-btns" id="quick-btns">
    </div>
    <div style="font-size:10px;color:rgba(255,255,255,0.3);margin:12px 0 8px">자주 쓰는 금액</div>
    <div id="presets"></div>
  `;

  const rate = await loadRate();
  document.getElementById('rate-val').textContent = `¥1 = ₩${rate.toFixed(2)}`;
  document.getElementById('rate-upd').textContent = `업데이트: ${new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'})}`;

  const quickAmts = [500, 1000, 2000, 5000, 10000, 50000];
  document.getElementById('quick-btns').innerHTML = quickAmts.map(a => `
    <button class="quick-btn" onclick="setJpy(${a})" style="--day-color:${color}">
      <span class="quick-jpy">¥${a.toLocaleString()}</span>
      <span class="quick-krw" style="color:${color}">≈₩${Math.round(a*rate).toLocaleString()}</span>
    </button>
  `).join('');

  const presets = [
    {label:'스카이라이너 (편도)', jpy:2570},
    {label:'시내 교통 (1회)', jpy:210},
    {label:'라멘 한 그릇', jpy:1200},
    {label:'편의점 아침', jpy:600},
    {label:'시부야 스카이', jpy:3400},
    {label:'고토쿠인 대불', jpy:500},
    {label:'에노시마 씨캔들', jpy:1000},
  ];
  document.getElementById('presets').innerHTML = presets.map(p=>`
    <div class="preset-row" onclick="setJpy(${p.jpy})">
      <span class="preset-label">${p.label}</span>
      <div class="preset-amounts">
        <span style="color:rgba(255,255,255,0.65)">¥${p.jpy.toLocaleString()}</span>
        <span style="color:${color}">≈₩${Math.round(p.jpy*rate).toLocaleString()}</span>
      </div>
    </div>
  `).join('');
}

function setJpy(v) {
  document.getElementById('inp-jpy').value = v;
  calcKrw();
}
function calcKrw() {
  const jpy = parseFloat(document.getElementById('inp-jpy').value);
  if (!isNaN(jpy) && exchangeRate) {
    document.getElementById('inp-krw').value = Math.round(jpy * exchangeRate).toLocaleString();
  } else {
    document.getElementById('inp-krw').value = '';
  }
}
function calcJpy() {
  const raw = document.getElementById('inp-krw').value.replace(/,/g,'');
  const krw = parseInt(raw);
  if (!isNaN(krw) && exchangeRate) {
    document.getElementById('inp-jpy').value = Math.round(krw / exchangeRate);
  } else {
    document.getElementById('inp-jpy').value = '';
  }
}
async function refreshRate() {
  const spin = document.getElementById('rate-spin');
  if (spin) spin.classList.add('spinning');
  await loadRate();
  if (spin) spin.classList.remove('spinning');
  await renderCurrencySheet();
}

/* ── INIT ── */
loadState();
setDayColor(DAY_COLORS[1]);
renderTabs();
renderProgress();
renderTimeline();
loadWeather();
loadRate();

// Service Worker 등록 — PWA 오프라인 동작용
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch((err) => {
      console.warn('SW 등록 실패:', err);
    });
  });
}
</script>
